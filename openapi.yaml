openapi: 3.0.0
info:
  title: dotti.work - api
  version: 1.0.0
  description: API REST para autenticação e gerenciamento de usuários

servers:
  - url: http://localhost/dottiwork_api/api
    description: local

  - url: https://api.dottiwork.com/api
    description: Ambiente

paths:
  /:
    get:
      summary: Verifica status da API
      description: Retorna informações básicas sobre a API
      tags:
        - Sistema
      responses:
        '200':
          description: API funcionando
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "API online"
                  version:
                    type: string
                    example: "1.0.0"

  /auth/login:
    post:
      summary: Realiza login
      description: Autentica um usuário e retorna um token de acesso
      tags:
        - Autenticação
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - senha
              properties:
                email:
                  type: string
                  format: email
                  example: "usuario@exemplo.com"
                senha:
                  type: string
                  format: password
                  example: "senha123"
      responses:
        '200':
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    example: "abc123def456..."
                  expires_in:
                    type: integer
                    example: 3600
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/signup:
    post:
      summary: Cadastra novo usuário
      description: Cria uma nova conta de usuário
      tags:
        - Autenticação
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - password_confirm
              properties:
                email:
                  type: string
                  format: email
                  example: "novousuario@exemplo.com"
                password:
                  type: string
                  format: password
                  example: "senha123"
                password_confirm:
                  type: string
                  format: password
                  example: "senha123"
      responses:
        '201':
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Usuário criado com sucesso"
                  user:
                    $ref: '#/components/schemas/User'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email já está em uso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/logout:
    post:
      summary: Realiza logout
      description: Invalida o token de acesso atual
      tags:
        - Autenticação
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Logout realizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Logout realizado com sucesso"
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/me:
    get:
      summary: Retorna dados do usuário autenticado
      description: Obtém informações do usuário logado
      tags:
        - Autenticação
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Dados do usuário
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/password_reset:
    post:
      summary: Solicita reset de senha
      description: Gera um código de 5 dígitos e envia para o e-mail informado. O código expira em 1 hora.
      tags:
        - Autenticação
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  example: "usuario@exemplo.com"
      responses:
        '200':
          description: Código enviado com sucesso (resposta genérica por segurança)
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Se este e-mail estiver cadastrado, você receberá o código em instantes."
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Erro ao enviar e-mail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/password_reset/{resetToken}/{email}:
    get:
      summary: Valida token de reset de senha
      description: Verifica se o código de reset é válido, não expirado e não utilizado
      tags:
        - Autenticação
      parameters:
        - in: path
          name: resetToken
          required: true
          schema:
            type: string
          description: Código de 5 dígitos de reset
          example: "12345"
        - in: path
          name: email
          required: true
          schema:
            type: string
            format: email
          description: E-mail do usuário
          example: "usuario@exemplo.com"
      responses:
        '200':
          description: Validação do token
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    example: true
        '400':
          description: Parâmetros obrigatórios não fornecidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/password_reset/credentials:
    post:
      summary: Reseta a senha do usuário
      description: Valida o token e atualiza a senha do usuário
      tags:
        - Autenticação
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - token
                - password
                - password_confirm
              properties:
                email:
                  type: string
                  format: email
                  example: "usuario@exemplo.com"
                token:
                  type: string
                  example: "12345"
                  description: Código de 5 dígitos recebido por e-mail
                password:
                  type: string
                  format: password
                  example: "novaSenha123"
                  description: Nova senha
                password_confirm:
                  type: string
                  format: password
                  example: "novaSenha123"
                  description: Confirmação da nova senha
      responses:
        '200':
          description: Senha atualizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Senha atualizada com sucesso"
        '400':
          description: Dados inválidos ou token inválido/expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /task/list:
    get:
      summary: Lista todas as tarefas do usuário
      description: Retorna todas as tarefas do usuário autenticado
      tags:
        - Tarefas
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Lista de tarefas
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /task/{id}:
    get:
      summary: Busca tarefa por ID
      description: Retorna informações de uma tarefa específica
      tags:
        - Tarefas
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID da tarefa
          example: 1
      responses:
        '200':
          description: Tarefa encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  task:
                    $ref: '#/components/schemas/Task'
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Tarefa não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /task/filter/category/{category_id}:
    get:
      summary: Lista tarefas por categoria
      description: Retorna todas as tarefas de uma categoria específica do usuário
      tags:
        - Tarefas
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: category_id
          required: true
          schema:
            type: integer
          description: ID da categoria
          example: 1
      responses:
        '200':
          description: Lista de tarefas da categoria
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Categoria não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /task/filter:
    get:
      summary: Filtra tarefas
      description: Retorna tarefas do usuário autenticado com filtros opcionais por data de vencimento, prioridade, status, categoria e texto livre
      tags:
        - Tarefas
      security:
        - ApiKeyAuth: []
      parameters:
        - in: query
          name: category_id
          required: false
          schema:
            type: integer
          description: Filtra por ID da categoria
          example: 1
        - in: query
          name: priority
          required: false
          schema:
            type: string
            enum: ["baixa", "media", "alta"]
          description: Filtra por prioridade
          example: "alta"
        - in: query
          name: is_completed
          required: false
          schema:
            type: integer
            enum: [0, 1]
          description: Filtra por status de conclusão (0 = pendente, 1 = concluída)
          example: 0
        - in: query
          name: due_date
          required: false
          schema:
            type: string
            format: date-time
          description: Retorna tarefas com data de vencimento até a data informada
          example: "2026-12-31 23:59:59"
        - in: query
          name: search
          required: false
          schema:
            type: string
          description: Texto livre para busca no título e descrição
          example: "relatório"
      responses:
        '200':
          description: Lista de tarefas filtradas
          content:
            application/json:
              schema:
                type: object
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /task/create:
    post:
      summary: Cria uma nova tarefa
      description: Cria uma nova tarefa para o usuário autenticado
      tags:
        - Tarefas
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - priority
              properties:
                category_id:
                  type: integer
                  example: 1
                  description: ID da categoria (opcional)
                title:
                  type: string
                  example: "string"
                  description: Título da tarefa
                description:
                  type: string
                  example: "string"
                  description: Descrição detalhada (opcional)
                is_completed:
                  type: integer
                  enum: [0, 1]
                  example: 0
                  description: Status de conclusão
                priority:
                  type: string
                  enum: ["baixa", "media", "alta"]
                  example: "string"
                  description: Prioridade da tarefa
                display_order:
                  type: integer
                  example: 1
                  description: Ordem de exibição
                due_date:
                  type: string
                  format: date-time
                  example: "2026-03-05 18:00:00"
                  description: Data de vencimento (opcional)
      responses:
        '201':
          description: Tarefa criada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Tarefa criada com sucesso"
                  task:
                    $ref: '#/components/schemas/Task'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /task/update:
    post:
      summary: Atualiza uma tarefa existente
      description: Atualiza informações de uma tarefa do usuário autenticado
      tags:
        - Tarefas
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - task_id
                - title
                - priority
              properties:
                task_id:
                  type: integer
                  example: 1
                  description: ID da tarefa a ser atualizada
                category_id:
                  type: integer
                  nullable: true
                  example: 1
                  description: ID da categoria (opcional)
                title:
                  type: string
                  example: "Finalizar relatório"
                  description: Título da tarefa
                description:
                  type: string
                  nullable: true
                  example: "Completar e revisar o relatório de desempenho"
                  description: Descrição detalhada (opcional)
                is_completed:
                  type: integer
                  enum: [0, 1]
                  example: 0
                  description: Status de conclusão
                priority:
                  type: string
                  enum: ["baixa", "media", "alta"]
                  example: "alta"
                  description: Prioridade da tarefa
                display_order:
                  type: integer
                  example: 1
                  description: Ordem de exibição
                due_date:
                  type: string
                  format: date-time
                  nullable: true
                  example: "2026-03-05 18:00:00"
                  description: Data de vencimento (opcional)
      responses:
        '200':
          description: Tarefa atualizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Tarefa atualizada com sucesso"
                  task:
                    $ref: '#/components/schemas/Task'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /task/delete:
    delete:
      summary: Deleta uma tarefa
      description: Remove uma tarefa do usuário autenticado
      tags:
        - Tarefas
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - task_id
              properties:
                task_id:
                  type: integer
                  example: 1
                  description: ID da tarefa a ser deletada
      responses:
        '200':
          description: Tarefa excluída com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Tarefa excluída com sucesso"
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /task/category/:
    get:
      summary: Lista categorias de tarefas
      description: Retorna todas as categorias de tarefas do usuário autenticado
      tags:
        - Categorias
      security:
        - ApiKeyAuth: []
      responses:
        '200':
          description: Lista de categorias
          content:
            application/json:
              schema:
                type: object
                properties:
                  categories:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          example: 1
                        name:
                          type: string
                          example: "Trabalho"
                        color:
                          type: string
                          example: "#FF5733"
                        display_order:
                          type: integer
                          example: 1
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /task/category/{id}:
    get:
      summary: Busca categoria por ID
      description: Retorna informações de uma categoria específica do usuário autenticado
      tags:
        - Categorias
      security:
        - ApiKeyAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: ID da categoria
          example: 1
      responses:
        '200':
          description: Categoria encontrada
          content:
            application/json:
              schema:
                type: object
                properties:
                  category:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: "Trabalho"
                      color:
                        type: string
                        example: "#FF5733"
                      display_order:
                        type: integer
                        example: 1
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Categoria não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /task/category/create:
    post:
      summary: Cria uma nova categoria
      description: Cria uma nova categoria de tarefas para o usuário autenticado
      tags:
        - Categorias
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: "Trabalho"
                  description: Nome da categoria
                color:
                  type: string
                  example: "#FF5733"
                  description: Cor da categoria em formato hexadecimal
                display_order:
                  type: integer
                  example: 1
                  description: Ordem de exibição
      responses:
        '201':
          description: Categoria criada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Categoria criada com sucesso"
                  category:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: "Trabalho"
                      color:
                        type: string
                        example: "#FF5733"
                      display_order:
                        type: integer
                        example: 1
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /task/category/update:
    post:
      summary: Atualiza uma categoria existente
      description: Atualiza informações de uma categoria do usuário autenticado
      tags:
        - Categorias
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
                - name
              properties:
                id:
                  type: integer
                  example: 1
                  description: ID da categoria a ser atualizada
                name:
                  type: string
                  example: "Trabalho"
                  description: Nome da categoria
                color:
                  type: string
                  example: "#FF5733"
                  description: Cor da categoria em formato hexadecimal
                display_order:
                  type: integer
                  example: 1
                  description: Ordem de exibição
      responses:
        '200':
          description: Categoria atualizada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Categoria atualizada com sucesso"
                  category:
                    type: object
                    properties:
                      id:
                        type: integer
                        example: 1
                      name:
                        type: string
                        example: "Trabalho"
                      color:
                        type: string
                        example: "#FF5733"
                      display_order:
                        type: integer
                        example: 1
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Categoria não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /task/category/delete:
    post:
      summary: Deleta uma categoria
      description: Remove uma categoria de tarefas do usuário autenticado
      tags:
        - Categorias
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - id
              properties:
                id:
                  type: integer
                  example: 1
                  description: ID da categoria a ser deletada
      responses:
        '200':
          description: Categoria excluída com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Categoria excluída com sucesso"
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Categoria não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: key
      description: Token de autenticação obtido no endpoint /auth/login. Envie o token no header 'key'

  schemas:
    Task:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        category_id:
          type: integer
          nullable: true
          example: 1
        title:
          type: string
          example: "Finalizar relatório"
        description:
          type: string
          nullable: true
          example: "Completar e revisar o relatório de desempenho"
        is_completed:
          type: integer
          enum: [0, 1]
          example: 0
        priority:
          type: string
          enum: ["baixa", "media", "alta"]
          example: "alta"
        display_order:
          type: integer
          example: 1
        due_date:
          type: string
          format: date-time
          nullable: true
          example: "2026-03-05 18:00:00"
        completed_at:
          type: string
          format: date-time
          nullable: true
          example: null
        created_at:
          type: string
          format: date-time
          example: "2026-03-02 17:30:00"
        updated_at:
          type: string
          format: date-time
          example: "2026-03-02 17:30:00"

    User:
      type: object
      properties:
        id:
