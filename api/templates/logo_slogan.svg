<svg width="600" height="160" viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg">
  <style>
    .main-text {
      font-family: "Noto Sans JP", "Noto Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 64px;
      font-weight: 600;
      letter-spacing: -1px;
    }
    .tagline {
      font-family: "Noto Sans JP", "Noto Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 4px;
      fill: #41494D;
    }
  </style>

  <!-- Logo principal -->
  <text x="20" y="70" class="main-text">
    <tspan fill="#41494D">dotti</tspan>
    <tspan fill="#FF6F61">.</tspan>
    <tspan fill="#41494D">work</tspan>
  </text>

  <!-- Slogan -->
  <text x="20" y="120" textLength="370" class="tagline">
    your focus zone
  </text>
