name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Create .env
        run: |
          echo "APP_ENV=${{ secrets.APP_ENV }}" > .env
          echo 'APP_SECRET="${{ secrets.APP_SECRET }}"' >> .env
          echo 'APP_ENCRYPTION_KEY="${{ secrets.APP_ENCRYPTION_KEY }}"' >> .env
          echo "FRONTEND_URL=${{ secrets.FRONTEND_URL }}" >> .env
          echo "API_BASE_URL=${{ secrets.API_BASE_URL }}" >> .env
          echo "CORS_ALLOWED_ORIGINS=${{ secrets.CORS_ALLOWED_ORIGINS }}" >> .env
          echo "SESSION_COOKIE_NAME=${{ secrets.SESSION_COOKIE_NAME }}" >> .env
          echo "SESSION_COOKIE_DOMAIN=${{ secrets.SESSION_COOKIE_DOMAIN }}" >> .env
          echo "SESSION_COOKIE_SECURE=${{ secrets.SESSION_COOKIE_SECURE }}" >> .env
          echo "SESSION_TOKEN_TTL_SECONDS=${{ secrets.SESSION_TOKEN_TTL_SECONDS }}" >> .env
          echo "DB_HOST=${{ secrets.DB_HOST }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo 'DB_PASSWORD="${{ secrets.DB_PASSWORD }}"' >> .env
          echo "DOCS_USER=${{ secrets.DOCS_USER }}" >> .env
          echo 'DOCS_PASSWORD="${{ secrets.DOCS_PASSWORD }}"' >> .env
          echo "OAUTH_GITHUB_CLIENT_ID=${{ secrets.OAUTH_GITHUB_CLIENT_ID }}" >> .env
          echo 'OAUTH_GITHUB_CLIENT_SECRET="${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}"' >> .env
          echo "OAUTH_GITHUB_REDIRECT_URI=${{ secrets.OAUTH_GITHUB_REDIRECT_URI }}" >> .env
          echo "OAUTH_GITHUB_SCOPES=${{ secrets.OAUTH_GITHUB_SCOPES }}" >> .env
          echo "OAUTH_GITHUB_API_VERSION=${{ secrets.OAUTH_GITHUB_API_VERSION }}" >> .env
          echo "OAUTH_GITHUB_USER_AGENT=${{ secrets.OAUTH_GITHUB_USER_AGENT }}" >> .env
          echo "OAUTH_GITHUB_CONNECT_TIMEOUT=${{ secrets.OAUTH_GITHUB_CONNECT_TIMEOUT }}" >> .env
          echo "OAUTH_GITHUB_TIMEOUT=${{ secrets.OAUTH_GITHUB_TIMEOUT }}" >> .env
          echo "REPOSITORY_CACHE_TTL_SECONDS=${{ secrets.REPOSITORY_CACHE_TTL_SECONDS }}" >> .env
          echo "ISSUES_CACHE_TTL_SECONDS=${{ secrets.ISSUES_CACHE_TTL_SECONDS }}" >> .env
          echo "MATCH_CACHE_TTL_SECONDS=${{ secrets.MATCH_CACHE_TTL_SECONDS }}" >> .env
          echo "MATCH_REFRESH_COOLDOWN_SECONDS=${{ secrets.MATCH_REFRESH_COOLDOWN_SECONDS }}" >> .env
          echo "MAIL_HOST=${{ secrets.MAIL_HOST }}" >> .env
          echo "MAIL_PORT=${{ secrets.MAIL_PORT }}" >> .env
          echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}" >> .env
          echo 'MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}"' >> .env
          echo "MAIL_ENCRYPTION=${{ secrets.MAIL_ENCRYPTION }}" >> .env
          echo "MAIL_FROM_EMAIL=${{ secrets.MAIL_FROM_EMAIL }}" >> .env
          echo "MAIL_FROM_NAME=${{ secrets.MAIL_FROM_NAME }}" >> .env
          echo "SENTRY_DSN=${{ secrets.SENTRY_DSN }}" >> .env

      - name: Deploy files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_PATH }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.env

      - name: Upload .env via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_PATH: ${{ secrets.FTP_PATH }}
        run: |
          HOST=$(echo "$FTP_HOST" | xargs)
          PATH_DIR=$(echo "$FTP_PATH" | xargs | sed 's|^/||; s|/$||')
          echo "::notice::FTP Host='$HOST' | Path='$PATH_DIR'"
          curl -T .env --ftp-create-dirs \
            "ftp://${HOST}/${PATH_DIR}/public_html/.env" \
            --user "${FTP_USER}:${FTP_PASSWORD}"
